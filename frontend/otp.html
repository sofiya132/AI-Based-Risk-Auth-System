<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification — AI Risk Auth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <h1>📧 Verify Identity</h1>
        <p class="subtitle">Enter the 6-digit code sent to your email</p>

        <div class="risk-panel">
            ⚠️ Unusual login activity detected. Please verify it's you.
        </div>

        <div id="alert" class="alert"></div>

        <div class="form-group">
            <label for="otp">Verification Code</label>
            <input type="text" id="otp" class="otp-input"
                   placeholder="000000" maxlength="6"
                   inputmode="numeric"
                   pattern="[0-9]{6}">
        </div>

        <button class="btn-primary" id="verify-btn" onclick="handleVerifyOTP()">
            Verify Code
        </button>

        <div class="link-row">
            <a href="login.html">← Back to login</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const userEmail = sessionStorage.getItem("otp_email");

        if (!userEmail) {
            window.location.href = "login.html";
        }

        async function handleVerifyOTP() {
            const otp = document.getElementById("otp").value.trim();
            const btn = document.getElementById("verify-btn");

            if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                showAlert("alert", "Please enter a valid 6-digit code.");
                return;
            }

            setButtonLoading(btn, true, "Verify Code");
            showAlert("alert", "⏳ Verifying, please wait...", "success");

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 90000);

            try {
                const response = await fetch(`${API_BASE}/verify-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: userEmail,
                        otp: otp
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeout);
                const data = await response.json();

                if (response.ok) {
                    saveToken(data.token);
                    sessionStorage.removeItem("otp_email");
                    showAlert("alert", "✅ Identity verified! Welcome.", "success");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
                } else {
                    showAlert("alert", data.error || "OTP verification failed.");
                }
            } catch (err) {
                clearTimeout(timeout);
                if (err.name === "AbortError") {
                    showAlert("alert", "⏱️ Server is waking up. Please try again in a moment.");
                } else {
                    showAlert("alert", "Cannot connect to server.");
                }
            } finally {
                setButtonLoading(btn, false, "Verify Code");
            }
        }

        document.getElementById("otp").addEventListener("input", function() {
            if (this.value.length === 6) {
                handleVerifyOTP();
            }
        });
    </script>
</body>
</html>
