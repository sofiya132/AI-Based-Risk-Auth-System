<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AI Risk Auth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <h1>🔐 Create Account</h1>
        <p class="subtitle">AI-powered risk-based authentication</p>

        <!-- Alert box: hidden by default, shown by JS on error/success -->
        <div id="alert" class="alert"></div>

        <!-- Registration Form -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min 8 characters">
        </div>

        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat your password">
        </div>

        <button class="btn-primary" id="register-btn" onclick="handleRegister()">
            Create Account
        </button>

        <div class="link-row">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <!-- Load shared utilities -->
    <script src="script.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        redirectIfLoggedIn();

        async function handleRegister() {
            const email    = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirm  = document.getElementById("confirm").value;
            const btn      = document.getElementById("register-btn");

            // Client-side validation
            if (!email || !password || !confirm) {
                showAlert("alert", "Please fill in all fields.");
                return;
            }
            if (password.length < 8) {
                showAlert("alert", "Password must be at least 8 characters.");
                return;
            }
            if (password !== confirm) {
                showAlert("alert", "Passwords do not match.");
                return;
            }

            setButtonLoading(btn, true, "Create Account");

            try {
                // Call /api/register with email, password, and device fingerprint
                const response = await fetch(`${API_BASE}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        // Send device fingerprint as the user's "usual device"
                        device_fingerprint: getDeviceFingerprint()
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Registration succeeded
                    showAlert("alert", "Account created! Redirecting to login...", "success");
                    // Wait 1.5 seconds then redirect
                    setTimeout(() => { window.location.href = "login.html"; }, 1500);
                } else {
                    showAlert("alert", data.error || "Registration failed.");
                }
            } catch (err) {
                showAlert("alert", "Cannot connect to server. Is the backend running?");
            } finally {
                // Always re-enable the button when done
                setButtonLoading(btn, false, "Create Account");
            }
        }
    </script>
</body>
</html>
